<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="initial-scale=1,maximum-scale=1,user-scalable=no"
    />
    <title>Daylight widget | Sample | ArcGIS Maps SDK for JavaScript</title>

    <script
      type="module"
      src="https://js.arcgis.com/calcite-components/3.3.3/calcite.esm.js"
    ></script>
    <link
      rel="stylesheet"
      href="https://js.arcgis.com/4.30/esri/themes/light/main.css"
    />
    <script src="https://js.arcgis.com/4.30/"></script>

    <script type="module">
      const [Map, SceneView, SceneLayer, Daylight, Expand] =
        await $arcgis.import([
          "@arcgis/core/Map.js",
          "@arcgis/core/views/SceneView.js",
          "@arcgis/core/layers/SceneLayer.js",
          "@arcgis/core/widgets/Daylight.js",
          "@arcgis/core/widgets/Expand.js",
        ]);

      // General camera settings
      const camera = {
        city: {
          position: {
            spatialReference: {
              wkid: 4517,
            },
            x: 29550918.4023793412,
            y: 4851821.841115765,
            z: 1435.9557423204722,
          },
          heading: 0,
          tilt: 39.739032538967635,
        },
        global: {
          position: {
            longitude: 27.05453608,
            latitude: 54.53236102,
            z: 10825172.372,
          },
          heading: 357.3,
          tilt: 0.19,
        },
      };

      /***********************************
       * Create the SceneView
       ***********************************/
      // Make a new map and load a scene layer
      const map = new Map({
        basemap: "satellite",
        ground: "world-elevation",
        layers: [
          // new SceneLayer({
          //   popupEnabled: false,
          //   portalItem: {
          //     id: "b343e14455fe45b98a2c20ebbceec0b0",
          //   },
          // }),
        ],
      });

      const view = new SceneView({
        map: map,
        container: "viewDiv",
        viewingMode: "local",
        // position in Brest, France
        camera: camera.city,
        // viewingMode: "local",
        environment: {
          lighting: {
            // autocasts as new SunLighting()
            type: "sun",
            date: Date.now(),
            directShadowsEnabled: true,
          },
        },
      });

      /**************************************
       * Initialize the daylight widget
       **************************************/

      const daylight = new Daylight({
        view: view,
        // plays the animation twice as fast than the default one
        playSpeedMultiplier: 2,
        // disable the timezone selection button
        visibleElements: {
          timezone: true,
        },
      });

      // Add widget inside an Expand widget to be able to hide it on devices with small screens
      view.ui.add(
        new Expand({ content: daylight, view: view, expanded: true }),
        "top-right"
      );

      /***********************************
       * Add functionality to change between city and global scale
       ***********************************/
      const buttonCity = document.getElementById("city");
      const buttonGlobal = document.getElementById("global");

      buttonCity.addEventListener("click", (event) => {
        // Change the viewpoint
        view.camera = camera.city;
        // Use the sun position on a set date and time to illuminate the scene
        daylight.viewModel.sunLightingEnabled = true;
        // Change timezone visibility
        // daylight.visibleElements.timezone = false;
        // Styling of the buttons
        buttonCity.appearance = "solid";
        buttonGlobal.appearance = "outline-fill";
      });

      buttonGlobal.addEventListener("click", (event) => {
        // Ignore the sun position and use virtual lighting to illuminate the scene
        daylight.viewModel.sunLightingEnabled = false;
        // Change the viewpoint
        view.camera = camera.global;
        // Change timezone visibility
        // daylight.visibleElements.timezone = true;
        // Styling of the buttons
        buttonCity.appearance = "outline-fill";
        buttonGlobal.appearance = "solid";
      });

      /***********************************
       * Add a prompt text before the daylight widget
       ***********************************/
      const toggleLightingPrompt = document.getElementById("infoDiv");
      view.ui.add({
        component: toggleLightingPrompt,
        position: "top-right",
        index: 0,
      });

      console.log(daylight);

      window.view = view;
    </script>

    <style>
      html,
      body,
      #viewDiv {
        height: 100%;
        margin: 0;
      }

      #selection {
        position: absolute;
        bottom: 20px;
        left: 20px;
        right: 20px;
        display: flex;
        justify-content: center;
      }

      #infoDiv {
        max-width: 389px;
        padding: 0 0.8rem;
        font-size: 0.8rem;
      }

      #city,
      #global {
        width: 40%;
        max-width: 300px;
        margin: 3px;
      }
    </style>
  </head>

  <body>
    <div id="viewDiv">
      <div id="infoDiv" class="esri-widget">
        <p>
          Use the sun position checkbox to illuminate the scene either by date
          and time or by virtual light (relative to camera).
        </p>
      </div>
      <div id="selection">
        <calcite-button id="city" appearance="solid"
          >City view (sunlight)</calcite-button
        >
        <calcite-button id="global" appearance="outline-fill"
          >Global view (virtual light)</calcite-button
        >
      </div>
    </div>
  </body>
</html>
