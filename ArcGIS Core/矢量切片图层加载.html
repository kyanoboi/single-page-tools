<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta
      name="viewport"
      content="initial-scale=1,maximum-scale=1,user-scalable=no"
    />
    <title>地铁T-CIM三期 | 矢量切片服务（脚本发布）| 成都建筑白膜</title>
    <style>
      html,
      body,
      #viewDiv {
        padding: 0;
        margin: 0;
        height: 100%;
        width: 100%;
      }
    </style>

    <link
      rel="stylesheet"
      href="https://js.arcgis.com/4.27/esri/themes/light/main.css"
    />
    <script src="https://js.arcgis.com/4.27/"></script>

    <script>
      require([
        "esri/Map",
        "esri/views/MapView",
        "esri/views/SceneView",
        "esri/layers/VectorTileLayer",
        "esri/layers/SceneLayer",
        "esri/widgets/LayerList",
      ], (Map, MapView, SceneView, VectorTileLayer, SceneLayer, LayerList) => {
        // Create a Map
        const map = new Map();

        // Make map view and bind it to the map
        const view = new SceneView({
          container: "viewDiv",
          map: map,
        });

        let layerList = new LayerList({
          view: view,
        });
        // Adds widget below other elements in the top left corner of the view
        view.ui.add(layerList, {
          position: "top-right",
        });

        /********************************************************************
         * Add a vector tile layer to the map
         *
         * The url must point to the style or the vector tile service
         *********************************************************************/
        const tileLayer = new VectorTileLayer({
          url: "https://wc.geoscene.cn/server/rest/services/Hosted/TileSharingDraftExample1/VectorTileServer",
        });
        view.map.add(tileLayer);

        const baimo = new SceneLayer({
          url: "https://ps.geoscene.cn/server/rest/services/Hosted/成都建筑白膜/SceneServer",
          visible: false,
        });
        view.map.add(baimo);
      });
    </script>
  </head>
  <body>
    <div id="viewDiv"></div>
  </body>
</html>
